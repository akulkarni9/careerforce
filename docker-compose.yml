services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobassistant_db
    environment:
      POSTGRES_USER: jobassistant
      POSTGRES_PASSWORD: jobassistant
      POSTGRES_DB: jobassistant
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
